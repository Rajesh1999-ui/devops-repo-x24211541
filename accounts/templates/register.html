{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block content %}
<style>
    .register-wrapper {
        min-height: 80vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #f0f4f8 0%, #d9e2ec 100%);
        padding: 40px 20px;
    }
    .register-card {
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(20px);
        border-radius: 24px;
        padding: 50px;
        max-width: 500px;
        width: 100%;
        box-shadow: 0 20px 60px rgba(0, 20, 40, 0.12);
        border: 1px solid rgba(255, 255, 255, 0.3);
    }
    .register-icon {
        text-align: center;
        margin-bottom: 25px;
    }
    .register-icon svg {
        width: 70px;
        height: 70px;
        fill: #4A90D9;
    }
    .register-title {
        font-size: 30px;
        font-weight: 700;
        color: #1a2a3a;
        text-align: center;
        margin-bottom: 5px;
    }
    .register-subtitle {
        text-align: center;
        color: #6b7a8a;
        font-size: 15px;
        margin-bottom: 30px;
    }
    .register-card .form-control {
        border: 2px solid #e2e8f0;
        border-radius: 12px;
        padding: 12px 18px;
        font-size: 15px;
        transition: all 0.3s ease;
        background: #f8fafc;
    }
    .register-card .form-control:focus {
        border-color: #4A90D9;
        box-shadow: 0 0 0 4px rgba(74, 144, 217, 0.15);
        background: white;
    }
    .register-card label {
        font-weight: 600;
        color: #2d3748;
        font-size: 14px;
        margin-bottom: 6px;
    }
    .btn-register {
        background: linear-gradient(135deg, #4A90D9, #357ABD);
        border: none;
        color: white;
        padding: 14px;
        font-weight: 600;
        border-radius: 12px;
        font-size: 16px;
        transition: all 0.3s ease;
        width: 100%;
    }
    .btn-register:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 30px rgba(74, 144, 217, 0.35);
        color: white;
    }
    .login-section {
        text-align: center;
        margin-top: 30px;
        padding-top: 25px;
        border-top: 2px solid #e2e8f0;
    }
    .login-section a {
        color: #4A90D9;
        font-weight: 600;
        text-decoration: none;
        transition: all 0.3s ease;
    }
    .login-section a:hover {
        color: #357ABD;
        text-decoration: underline;
    }
    .login-section span {
        color: #6b7a8a;
    }
</style>

<div class="register-wrapper">
    <div class="register-card">
        <div class="register-icon">
            <svg viewBox="0 0 24 24"><path d="M15 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm-9-2V7H4v3H1v2h3v3h2v-3h3v-2H6zm9 4c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
        </div>
        <h2 class="register-title">Create Account</h2>
        <p class="register-subtitle">Join our community today</p>
        <form method="POST">
            {% csrf_token %}
            {{ form|crispy }}
            <button class="btn-register mt-3" type="submit">Create Account</button>
        </form>
        <div class="login-section">
            <span>Already have an account?</span>
            <a href="{% url 'accounts:user_login' %}">Sign In</a>
        </div>
    </div>
</div>
{% endblock %}
