<!-- password_reset_complete.html - Password Changed Successfully -->
{% extends "base.html" %}

{% block content %}
<style>
    .complete-wrapper {
        min-height: 80vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #f0f4f8 0%, #d9e2ec 100%);
        padding: 40px 20px;
    }
    .complete-card {
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(20px);
        border-radius: 24px;
        padding: 55px 45px;
        max-width: 500px;
        width: 100%;
        text-align: center;
        box-shadow: 0 20px 60px rgba(0, 20, 40, 0.12);
        border: 1px solid rgba(255, 255, 255, 0.3);
    }
    .complete-icon {
        margin-bottom: 25px;
    }
    .complete-icon svg {
        width: 80px;
        height: 80px;
        fill: #48BB78;
    }
    .complete-title {
        font-size: 30px;
        font-weight: 700;
        color: #1a2a3a;
        margin-bottom: 10px;
    }
    .complete-message {
        background: #e6f7ed;
        color: #276749;
        padding: 18px;
        border-radius: 12px;
        font-size: 16px;
        font-weight: 500;
        margin: 25px 0 30px;
    }
    .btn-login {
        background: linear-gradient(135deg, #4A90D9, #357ABD);
        border: none;
        color: white;
        padding: 14px 45px;
        font-weight: 600;
        border-radius: 12px;
        font-size: 16px;
        transition: all 0.3s ease;
        text-decoration: none;
        display: inline-block;
    }
    .btn-login:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 30px rgba(74, 144, 217, 0.35);
        color: white;
    }
</style>

<div class="complete-wrapper">
    <div class="complete-card">
        <div class="complete-icon">
            <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
        </div>
        <h2 class="complete-title">Password Reset</h2>
        <div class="complete-message">
            Your password has been changed successfully
        </div>
        <a href="{% url 'accounts:user_login' %}" class="btn-login">
            Sign In Now
        </a>
    </div>
</div>
{% endblock %}
