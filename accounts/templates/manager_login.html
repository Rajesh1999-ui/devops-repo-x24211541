<!-- manage_login.html - Dashboard Login Page -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <title>Dashboard Login</title>
    <style>
        * {
            font-family: 'Inter', sans-serif;
        }
        body {
            background: linear-gradient(135deg, #e8edf5 0%, #d5dce6 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }
        .login-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 28px;
            padding: 55px 45px;
            box-shadow: 0 30px 80px rgba(0, 20, 40, 0.15);
            max-width: 420px;
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .login-icon {
            text-align: center;
            margin-bottom: 30px;
        }
        .login-icon svg {
            width: 80px;
            height: 80px;
            fill: #4A90D9;
        }
        .login-title {
            font-size: 32px;
            font-weight: 700;
            color: #1a2a3a;
            text-align: center;
            margin-bottom: 8px;
        }
        .login-subtitle {
            text-align: center;
            color: #6b7a8a;
            font-size: 15px;
            margin-bottom: 35px;
        }
        .login-container .form-control {
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 12px 18px;
            margin-bottom: 20px;
            font-size: 15px;
            transition: all 0.3s ease;
            background: #f8fafc;
        }
        .login-container .form-control:focus {
            border-color: #4A90D9;
            box-shadow: 0 0 0 4px rgba(74, 144, 217, 0.15);
            background: white;
        }
        .login-container label {
            font-weight: 600;
            color: #2d3748;
            font-size: 14px;
            margin-bottom: 6px;
        }
        .btn-signin {
            background: linear-gradient(135deg, #4A90D9, #357ABD);
            border: none;
            color: white;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 12px;
            transition: all 0.3s ease;
            width: 100%;
        }
        .btn-signin:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(74, 144, 217, 0.35);
            color: white;
        }
        .back-link {
            text-align: center;
            margin-top: 25px;
        }
        .back-link a {
            color: #4A90D9;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        .back-link a:hover {
            color: #357ABD;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-icon">
            <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V5h14v14zM7 10h2v7H7zm4-3h2v10h-2zm4 6h2v4h-2z"/></svg>
        </div>
        <h2 class="login-title">Dashboard</h2>
        <p class="login-subtitle">Admin access only</p>
        <form method="post">
            {% csrf_token %}
            {{ form }}
            <button class="btn-signin" type="submit">Sign In</button>
        </form>
        <p class="back-link">
            <a href="{% url 'shop:home_page' %}">← Back to shop</a>
        </p>
    </div>
</body>
</html>
