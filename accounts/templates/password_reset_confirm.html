<!-- password_reset_confirm.html - Enter New Password -->
{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block content %}
<style>
    .confirm-wrapper {
        min-height: 80vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #f0f4f8 0%, #d9e2ec 100%);
        padding: 40px 20px;
    }
    .confirm-card {
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(20px);
        border-radius: 24px;
        padding: 50px;
        max-width: 480px;
        width: 100%;
        box-shadow: 0 20px 60px rgba(0, 20, 40, 0.12);
        border: 1px solid rgba(255, 255, 255, 0.3);
    }
    .confirm-icon {
        text-align: center;
        margin-bottom: 25px;
    }
    .confirm-icon svg {
        width: 65px;
        height: 65px;
        fill: #4A90D9;
    }
    .confirm-title {
        font-size: 28px;
        font-weight: 700;
        color: #1a2a3a;
        text-align: center;
        margin-bottom: 8px;
    }
    .confirm-subtitle {
        text-align: center;
        color: #6b7a8a;
        font-size: 15px;
        margin-bottom: 30px;
    }
    .confirm-card .form-control {
        border: 2px solid #e2e8f0;
        border-radius: 12px;
        padding: 12px 18px;
        font-size: 15px;
        transition: all 0.3s ease;
        background: #f8fafc;
    }
    .confirm-card .form-control:focus {
        border-color: #4A90D9;
        box-shadow: 0 0 0 4px rgba(74, 144, 217, 0.15);
        background: white;
    }
    .confirm-card label {
        font-weight: 600;
        color: #2d3748;
        font-size: 14px;
        margin-bottom: 6px;
    }
    .btn-confirm {
        background: linear-gradient(135deg, #4A90D9, #357ABD);
        border: none;
        color: white;
        padding: 14px;
        font-weight: 600;
        border-radius: 12px;
        font-size: 16px;
        transition: all 0.3s ease;
        width: 100%;
    }
    .btn-confirm:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 30px rgba(74, 144, 217, 0.35);
        color: white;
    }
</style>

<div class="confirm-wrapper">
    <div class="confirm-card">
        <div class="confirm-icon">
            <svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
        </div>
        <h2 class="confirm-title">New Password</h2>
        <p class="confirm-subtitle">Create a strong password</p>
        <form method="POST">
            {% csrf_token %}
            {{ form|crispy }}
            <button class="btn-confirm mt-3" type="submit">Reset Password</button>
        </form>
    </div>
</div>
{% endblock %}
