<!-- password_reset.html - Request Password Reset -->
{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block content %}
<style>
    .reset-wrapper {
        min-height: 80vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #f0f4f8 0%, #d9e2ec 100%);
        padding: 40px 20px;
    }
    .reset-card {
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(20px);
        border-radius: 24px;
        padding: 50px;
        max-width: 480px;
        width: 100%;
        box-shadow: 0 20px 60px rgba(0, 20, 40, 0.12);
        border: 1px solid rgba(255, 255, 255, 0.3);
    }
    .reset-icon {
        text-align: center;
        margin-bottom: 25px;
    }
    .reset-icon svg {
        width: 65px;
        height: 65px;
        fill: #4A90D9;
    }
    .reset-title {
        font-size: 28px;
        font-weight: 700;
        color: #1a2a3a;
        text-align: center;
        margin-bottom: 5px;
    }
    .reset-subtitle {
        text-align: center;
        color: #6b7a8a;
        font-size: 15px;
        margin-bottom: 30px;
    }
    .info-box {
        background: #e8f0fe;
        border-left: 4px solid #4A90D9;
        padding: 15px 20px;
        border-radius: 10px;
        margin-bottom: 25px;
        color: #1a2a3a;
        font-weight: 500;
        font-size: 14px;
    }
    .reset-card .form-control {
        border: 2px solid #e2e8f0;
        border-radius: 12px;
        padding: 12px 18px;
        font-size: 15px;
        transition: all 0.3s ease;
        background: #f8fafc;
    }
    .reset-card .form-control:focus {
        border-color: #4A90D9;
        box-shadow: 0 0 0 4px rgba(74, 144, 217, 0.15);
        background: white;
    }
    .reset-card label {
        font-weight: 600;
        color: #2d3748;
        font-size: 14px;
        margin-bottom: 6px;
    }
    .btn-reset {
        background: linear-gradient(135deg, #4A90D9, #357ABD);
        border: none;
        color: white;
        padding: 14px;
        font-weight: 600;
        border-radius: 12px;
        font-size: 16px;
        transition: all 0.3s ease;
        width: 100%;
    }
    .btn-reset:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 30px rgba(74, 144, 217, 0.35);
        color: white;
    }
</style>

<div class="reset-wrapper">
    <div class="reset-card">
        <div class="reset-icon">
            <svg viewBox="0 0 24 24"><path d="M12 4C8.48 4 5.58 6.31 4.79 9.21L2 6.42V14h7.58l-2.8-2.8C7.36 9.1 9.4 8 12 8c3.87 0 7 3.13 7 7h2c0-4.97-4.03-9-9-9z"/></svg>
        </div>
        <h2 class="reset-title">Reset Password</h2>
        <p class="reset-subtitle">We'll send you a reset link</p>
        <form method="POST">
            {% csrf_token %}
            <div class="info-box">
                Enter the email address associated with your account
            </div>
            {{ form|crispy }}
            <button class="btn-reset mt-3" type="submit">Send Reset Link</button>
        </form>
    </div>
</div>
{% endblock %}
