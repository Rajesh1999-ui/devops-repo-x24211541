<!-- add_product.html - Add New Product -->
{% extends "dashboard.html" %}

{% block content %}
<style>
    .add-form .form-control, .add-form .form-select {
        margin-bottom: 20px;
    }
    .add-form label {
        font-weight: 600;
        color: #1a2a3a;
        margin-bottom: 6px;
        font-size: 14px;
    }
    .add-form .form-text {
        color: #6b7a8a;
        font-size: 13px;
    }
</style>

<div class="add-form">
    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form }}
        <div class="form-group mt-4">
            <button class="btn btn-primary w-100" type="submit">
                Add Product
            </button>
        </div>
    </form>
</div>
{% endblock %}
