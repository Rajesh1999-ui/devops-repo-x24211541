{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block content %}
<style>
    .login-wrapper {
        min-height: 80vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #f0f4f8 0%, #d9e2ec 100%);
        padding: 40px 20px;
    }
    .login-card {
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(20px);
        border-radius: 24px;
        padding: 50px;
        max-width: 450px;
        width: 100%;
        box-shadow: 0 20px 60px rgba(0, 20, 40, 0.12);
        border: 1px solid rgba(255, 255, 255, 0.3);
    }
    .login-icon {
        text-align: center;
        margin-bottom: 25px;
    }
    .login-icon svg {
        width: 70px;
        height: 70px;
        fill: #4A90D9;
    }
    .login-title {
        font-size: 30px;
        font-weight: 700;
        color: #1a2a3a;
        text-align: center;
        margin-bottom: 5px;
    }
    .login-subtitle {
        text-align: center;
        color: #6b7a8a;
        font-size: 15px;
        margin-bottom: 35px;
    }
    .login-card .form-control {
        border: 2px solid #e2e8f0;
        border-radius: 12px;
        padding: 12px 18px;
        font-size: 15px;
        transition: all 0.3s ease;
        background: #f8fafc;
    }
    .login-card .form-control:focus {
        border-color: #4A90D9;
        box-shadow: 0 0 0 4px rgba(74, 144, 217, 0.15);
        background: white;
    }
    .login-card label {
        font-weight: 600;
        color: #2d3748;
        font-size: 14px;
        margin-bottom: 6px;
    }
    .btn-login {
        background: linear-gradient(135deg, #4A90D9, #357ABD);
        border: none;
        color: white;
        padding: 14px;
        font-weight: 600;
        border-radius: 12px;
        font-size: 16px;
        transition: all 0.3s ease;
        width: 100%;
    }
    .btn-login:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 30px rgba(74, 144, 217, 0.35);
        color: white;
    }
    .forgot-link {
        color: #4A90D9;
        text-decoration: none;
        font-weight: 600;
        font-size: 14px;
        transition: all 0.3s ease;
    }
    .forgot-link:hover {
        color: #357ABD;
        text-decoration: underline;
    }
    .signup-section {
        text-align: center;
        margin-top: 30px;
        padding-top: 25px;
        border-top: 2px solid #e2e8f0;
    }
    .signup-section a {
        color: #4A90D9;
        font-weight: 600;
        text-decoration: none;
        transition: all 0.3s ease;
    }
    .signup-section a:hover {
        color: #357ABD;
        text-decoration: underline;
    }
    .signup-section span {
        color: #6b7a8a;
    }
</style>

<div class="login-wrapper">
    <div class="login-card">
        <div class="login-icon">
            <svg viewBox="0 0 24 24"><path d="M12 12c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm0 2c-3.33 0-10 1.67-10 5v2h20v-2c0-3.33-6.67-5-10-5z"/></svg>
        </div>
        <h2 class="login-title">Welcome Back</h2>
        <p class="login-subtitle">Sign in to your account</p>
        <form method="POST">
            {% csrf_token %}
            {{ form|crispy }}
            <button class="btn-login mt-3" type="submit">Sign In</button>
            <div class="text-center mt-3">
                <a class="forgot-link" href="{% url 'accounts:password_reset' %}">Forgot password?</a>
            </div>
        </form>
        <div class="signup-section">
            <span>Don't have an account?</span>
            <a href="{% url 'accounts:user_register' %}">Create one</a>
        </div>
    </div>
</div>
{% endblock %}
