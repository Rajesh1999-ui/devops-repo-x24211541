<!-- password_reset_done.html - Reset Email Sent -->
{% extends "base.html" %}

{% block content %}
<style>
    .done-wrapper {
        min-height: 80vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #f0f4f8 0%, #d9e2ec 100%);
        padding: 40px 20px;
    }
    .done-card {
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(20px);
        border-radius: 24px;
        padding: 55px 45px;
        max-width: 500px;
        width: 100%;
        text-align: center;
        box-shadow: 0 20px 60px rgba(0, 20, 40, 0.12);
        border: 1px solid rgba(255, 255, 255, 0.3);
    }
    .done-icon {
        margin-bottom: 25px;
    }
    .done-icon svg {
        width: 80px;
        height: 80px;
        fill: #48BB78;
    }
    .done-title {
        font-size: 30px;
        font-weight: 700;
        color: #1a2a3a;
        margin-bottom: 10px;
    }
    .done-message {
        background: #e6f7ed;
        color: #276749;
        padding: 18px;
        border-radius: 12px;
        font-size: 16px;
        font-weight: 500;
        margin-top: 20px;
    }
</style>

<div class="done-wrapper">
    <div class="done-card">
        <div class="done-icon">
            <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
        </div>
        <h2 class="done-title">Email Sent</h2>
        <div class="done-message">
            Check your inbox for password reset instructions
        </div>
    </div>
</div>
{% endblock %}
