<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>{{title}} - Dashboard</title>
    <style>
        * {
            font-family: 'Inter', sans-serif;
        }
        body {
            background: linear-gradient(135deg, #e8edf5 0%, #d5dce6 100%);
            min-height: 100vh;
            margin: 0;
        }
        .dashboard-wrapper {
            padding: 30px;
            max-width: 1400px;
            margin: 0 auto;
        }
        .main-content {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 35px;
            box-shadow: 0 10px 40px rgba(0, 20, 40, 0.08);
            min-height: 500px;
        }
        .page-title {
            font-size: 28px;
            font-weight: 700;
            color: #1a2a3a;
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 2px solid #e8edf5;
        }
        .sidebar {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 30px 25px;
            box-shadow: 0 10px 40px rgba(0, 20, 40, 0.08);
        }
        .sidebar-title {
            font-size: 20px;
            font-weight: 700;
            color: #1a2a3a;
            margin-bottom: 20px;
        }
        .menu-item {
            display: flex;
            align-items: center;
            padding: 12px 18px;
            margin-bottom: 8px;
            border-radius: 12px;
            text-decoration: none;
            color: #4a5568;
            font-weight: 500;
            transition: all 0.3s ease;
            border: 1px solid transparent;
        }
        .menu-item:hover {
            background: #e8f0fe;
            color: #4A90D9;
            transform: translateX(5px);
        }
        .menu-item svg {
            width: 22px;
            height: 22px;
            margin-right: 12px;
            fill: currentColor;
        }
        .menu-item.primary {
            background: linear-gradient(135deg, #4A90D9, #357ABD);
            color: white;
        }
        .menu-item.primary:hover {
            background: linear-gradient(135deg, #357ABD, #2a6ba8);
            color: white;
            transform: translateX(5px);
            box-shadow: 0 5px 20px rgba(74, 144, 217, 0.3);
        }
        .menu-item.danger {
            background: #fde8e8;
            color: #e53e3e;
        }
        .menu-item.danger:hover {
            background: #e53e3e;
            color: white;
            transform: translateX(5px);
        }
        .menu-divider {
            border: none;
            border-top: 2px solid #e8edf5;
            margin: 20px 0;
        }
        .user-info {
            background: #f8fafc;
            padding: 15px 18px;
            border-radius: 12px;
            margin-top: 20px;
            border: 1px solid #e8edf5;
        }
        .user-label {
            color: #6b7a8a;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }
        .user-email {
            color: #1a2a3a;
            font-weight: 600;
            font-size: 15px;
            word-break: break-all;
        }
        .alert {
            border-radius: 12px;
            border: none;
            font-weight: 500;
            padding: 15px 20px;
        }
        .alert-success {
            background: #e6f7ed;
            color: #276749;
        }
        .alert-error {
            background: #fde8e8;
            color: #9b2c2c;
        }
        .form-control, .form-select {
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            padding: 10px 16px;
            transition: all 0.3s ease;
            background: #f8fafc;
        }
        .form-control:focus, .form-select:focus {
            border-color: #4A90D9;
            box-shadow: 0 0 0 4px rgba(74, 144, 217, 0.15);
            background: white;
        }
        .btn-primary {
            background: linear-gradient(135deg, #4A90D9, #357ABD);
            border: none;
            font-weight: 600;
            padding: 12px 30px;
            border-radius: 10px;
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(74, 144, 217, 0.35);
        }
        @media (max-width: 992px) {
            .sidebar {
                margin-top: 30px;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard-wrapper">
        <div class="row g-4">
            <!-- Main Content -->
            <div class="col-lg-8">
                <div class="main-content">
                    <h2 class="page-title">{{ title }}</h2>
                    
                    {% if messages %}
                    {% for message in messages %}
                    <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                    {% endfor %}
                    {% endif %}
                    
                    {% block content %}{% endblock %}
                </div>
            </div>

            <!-- Sidebar -->
            <div class="col-lg-4">
                <div class="sidebar">
                    <h3 class="sidebar-title">Dashboard</h3>
                    
                    <a class="menu-item" href="{% url 'dashboard:products' %}">
                        <svg viewBox="0 0 24 24"><path d="M4 6h16v2H4zm0 5h16v2H4zm0 5h10v2H4z"/></svg>
                        Products
                    </a>
                    
                    <a class="menu-item" href="{% url 'dashboard:add_product' %}">
                        <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
                        Add Product
                    </a>
                    
                    <a class="menu-item" href="{% url 'dashboard:add_category' %}">
                        <svg viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
                        Add Category
                    </a>
                    
                    <a class="menu-item" href="{% url 'dashboard:orders' %}">
                        <svg viewBox="0 0 24 24"><path d="M19 3h-4.18C14.4 1.84 13.3 1 12 1c-1.3 0-2.4.84-2.82 2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 0c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zm2 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
                        Orders
                    </a>
                    
                    <hr class="menu-divider">
                    
                    <a class="menu-item primary" href="{% url 'shop:home_page' %}">
                        <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
                        Back to Shop
                    </a>
                    
                    <a class="menu-item danger" href="{% url 'accounts:user_logout' %}">
                        <svg viewBox="0 0 24 24"><path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/></svg>
                        Logout
                    </a>
                    
                    <div class="user-info">
                        <div class="user-label">Logged in as</div>
                        <div class="user-email">{{ request.user.email }}</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
