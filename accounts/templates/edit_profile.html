<!-- edit_profile.html - Edit User Profile -->
{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block content %}
<style>
    .profile-wrapper {
        min-height: 80vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #f5f7fa 0%, #e8edf5 100%);
        padding: 40px 20px;
    }
    .profile-card {
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(20px);
        border-radius: 24px;
        padding: 50px;
        max-width: 550px;
        width: 100%;
        box-shadow: 0 20px 60px rgba(0, 20, 40, 0.12);
        border: 1px solid rgba(255, 255, 255, 0.3);
    }
    .profile-avatar {
        width: 100px;
        height: 100px;
        border-radius: 50%;
        background: linear-gradient(135deg, #4A90D9, #357ABD);
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 25px;
        box-shadow: 0 8px 30px rgba(74, 144, 217, 0.3);
    }
    .profile-avatar svg {
        width: 50px;
        height: 50px;
        fill: white;
    }
    .profile-title {
        font-size: 28px;
        font-weight: 700;
        color: #1a2a3a;
        text-align: center;
        margin-bottom: 8px;
    }
    .profile-subtitle {
        text-align: center;
        color: #6b7a8a;
        font-size: 15px;
        margin-bottom: 35px;
    }
    .profile-card .form-control {
        border: 2px solid #e2e8f0;
        border-radius: 12px;
        padding: 12px 18px;
        font-size: 15px;
        transition: all 0.3s ease;
        background: #f8fafc;
    }
    .profile-card .form-control:focus {
        border-color: #4A90D9;
        box-shadow: 0 0 0 4px rgba(74, 144, 217, 0.15);
        background: white;
    }
    .profile-card label {
        font-weight: 600;
        color: #2d3748;
        font-size: 14px;
        margin-bottom: 6px;
    }
    .btn-update {
        background: linear-gradient(135deg, #4A90D9, #357ABD);
        border: none;
        color: white;
        padding: 14px;
        font-weight: 600;
        border-radius: 12px;
        font-size: 16px;
        transition: all 0.3s ease;
        width: 100%;
    }
    .btn-update:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 30px rgba(74, 144, 217, 0.35);
        color: white;
    }
    .btn-update:active {
        transform: translateY(0);
    }
</style>

<div class="profile-wrapper">
    <div class="profile-card">
        <div class="profile-avatar">
            <svg viewBox="0 0 24 24"><path d="M12 12c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm0 2c-3.33 0-10 1.67-10 5v2h20v-2c0-3.33-6.67-5-10-5z"/></svg>
        </div>
        <h2 class="profile-title">Edit Profile</h2>
        <p class="profile-subtitle">Update your personal information</p>
        <form method="POST">
            {% csrf_token %}
            {{ form|crispy }}
            <button class="btn-update mt-3" type="submit">Save Changes</button>
        </form>
    </div>
</div>
{% endblock %}
